<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWC Logo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    }

    .gwc-logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      user-select: none;
    }

    /* ── Acronym ─────────────────────────────────────────────────────── */
    .gwc-acronym {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -3px;
      color: #1a1a1a;
      line-height: 1;
    }
    .gwc-acronym .red { color: #b22222; }

    /* ── Rule ────────────────────────────────────────────────────────── */
    .gwc-rule {
      width: 100%;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
    }

    /* ── Slogan ──────────────────────────────────────────────────────── */
    /*
      6 slots × 1.6 s = 9.6 s cycle.
      enter end = 3.125%  (0.3 s)
      hold  end = 13.542% (1.3 s)
      exit  end = 16.667% (1.6 s)

      EN slots (1–3): "Real" static + red keyword slides up
      DE slots (4–6): "Echt" static + black suffix slides up + red keyword slides up
        slot 4: suffix = "e"   → "Echte Stimme"
        slot 5: suffix = "er"  → "Echter Wandel"
        slot 6: suffix = "e"   → "Echte Verantwortung"
    */
    .gwc-slogan {
      margin-top: 8px;
      position: relative;
      height: 1.25em;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.25em;
      display: flex;
      align-items: center;
      gap: 0;
    }

    /* ── Static stems ────────────────────────────────────────────────── */
    /* "Real" is always visible — EN only, never changes */
    .gwc-stem-en {
      color: #1a1a1a;
      white-space: nowrap;
      margin-right: 0.22em;
    }

    /* "Echt" fades in for DE slots, fades out after */
    .gwc-stem-de {
      color: #1a1a1a;
      white-space: nowrap;
      position: absolute;
      left: 0;
      opacity: 0;
    }

    /* ── Suffix + keyword track ──────────────────────────────────────── */
    /*
      The whole animated area sits to the right of whichever stem is active.
      We use a single row that shifts left by "Real " width during EN
      and shifts right for DE. Simpler: just two separate rows, one visible.
    */

    /* EN row: just the keyword, no suffix */
    .gwc-row-en {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 1.25em;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* DE row: suffix + keyword together */
    .gwc-row-de {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 1.25em;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /*
      Cleaner approach: one container sized to fit everything.
      Each slot is absolutely positioned inside it.
    */
    .gwc-slogan {
      position: relative;
      width: 420px;
    }

    /* The static "Real" */
    .stem-real {
      position: absolute;
      left: 0;
      top: 0;
      line-height: 1.25em;
      color: #1a1a1a;
      white-space: nowrap;
    }

    /* The static "Echt" — fades in/out with DE block */
    .stem-echt {
      position: absolute;
      left: 0;
      top: 0;
      line-height: 1.25em;
      color: #1a1a1a;
      white-space: nowrap;
      opacity: 0;
    }

    @keyframes stemEchtIn {
      0%      { opacity: 0; }
      3.125%  { opacity: 1; }
      46.875% { opacity: 1; }
      50%     { opacity: 0; }
      50.1%   { opacity: 0; }
      100%    { opacity: 0; }
    }
    .stem-echt { animation: stemEchtIn 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }

    /* "Real" fades out when DE block starts */
    @keyframes stemRealOut {
      0%      { opacity: 1; }
      46.875% { opacity: 1; }
      50%     { opacity: 0; }
      50.1%   { opacity: 0; }
      96.875% { opacity: 0; }
      100%    { opacity: 1; }
    }
    .stem-real { animation: stemRealOut 9.6s cubic-bezier(0.22,1,0.36,1) 0s infinite; }

    /* ── Animated track ──────────────────────────────────────────────── */
    /* All sliding elements share the same keyframe */
    @keyframes slideUp {
      0%      { opacity: 0; transform: translateY(100%);  }
      3.125%  { opacity: 1; transform: translateY(0);     }
      13.542% { opacity: 1; transform: translateY(0);     }
      16.667% { opacity: 0; transform: translateY(-100%); }
      16.7%   { opacity: 0; transform: translateY(100%);  }
      100%    { opacity: 0; transform: translateY(100%);  }
    }

    /* Each slot: black suffix (optional) + red keyword, absolutely placed */
    .gwc-slot {
      position: absolute;
      top: 0;
      display: flex;
      align-items: center;
      line-height: 1.25em;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(100%);
    }

    .gwc-slot .sfx {
      color: #1a1a1a; /* black suffix letter */
    }

    .gwc-slot .kw {
      color: #b22222; /* red keyword */
    }

    /* EN slots: left = after "Real " (Real ≈ 2.05em + 0.22em gap) */
    .gwc-slot.en { left: 2.27em; }

    /* DE slots: left = after "Echt" (≈ 1.85em), suffix sits right after */
    .gwc-slot.de { left: 1.85em; }

    /* Gap between suffix and keyword for DE */
    .gwc-slot.de .kw { margin-left: 0.28em; }
    /* Gap between "Real" and EN keyword */
    .gwc-slot.en .kw { margin-left: 0; }

    /* Delays */
    .gwc-slot:nth-child(1) { animation: slideUp 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-slot:nth-child(2) { animation: slideUp 9.6s cubic-bezier(0.22,1,0.36,1) 1.6s infinite; }
    .gwc-slot:nth-child(3) { animation: slideUp 9.6s cubic-bezier(0.22,1,0.36,1) 3.2s infinite; }
    .gwc-slot:nth-child(4) { animation: slideUp 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
    .gwc-slot:nth-child(5) { animation: slideUp 9.6s cubic-bezier(0.22,1,0.36,1) 6.4s infinite; }
    .gwc-slot:nth-child(6) { animation: slideUp 9.6s cubic-bezier(0.22,1,0.36,1) 8.0s infinite; }

    /* ── Wordmark ────────────────────────────────────────────────────── */
    .gwc-wordmark {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .gwc-fullname {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #555;
    }

    .gwc-tagline {
      position: relative;
      height: 1.4em;
      overflow: hidden;
      font-size: 10px;
    }

    .gwc-tagline > span {
      position: absolute;
      left: 0;
      top: 0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #aaa;
      white-space: nowrap;
      line-height: 1.4em;
      opacity: 0;
    }

    @keyframes taglineIn {
      0%      { opacity: 0; }
      3.125%  { opacity: 1; }
      46.875% { opacity: 1; }
      50%     { opacity: 0; }
      50.1%   { opacity: 0; }
      100%    { opacity: 0; }
    }

    .gwc-tagline .t-en { animation: taglineIn 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-tagline .t-de { animation: taglineIn 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
  </style>
</head>
<body>

  <div class="gwc-logo">

    <div class="gwc-acronym"><span class="red">G</span>WC</div>
    <div class="gwc-rule"></div>

    <div class="gwc-slogan">
      <!-- Static stems -->
      <span class="stem-real">Real</span>
      <span class="stem-echt">Echt</span>

      <!-- Animated slots -->
      <!-- EN: no suffix, just red keyword -->
      <div class="gwc-slot en"><span class="kw">Voice</span></div>
      <div class="gwc-slot en"><span class="kw">Change</span></div>
      <div class="gwc-slot en"><span class="kw">Accountability</span></div>
      <!-- DE: black suffix + red keyword -->
      <div class="gwc-slot de"><span class="sfx">e</span><span class="kw">Stimme</span></div>
      <div class="gwc-slot de"><span class="sfx">er</span><span class="kw">Wandel</span></div>
      <div class="gwc-slot de"><span class="sfx">e</span><span class="kw">Verantwortung</span></div>
    </div>

    <div class="gwc-wordmark">
      <div class="gwc-fullname">Global Workforce Community</div>
      <div class="gwc-tagline">
        <span class="t-en">A Works Council That Acts for You</span>
        <span class="t-de">Ein Betriebsrat, der für dich handelt</span>
      </div>
    </div>

  </div>

</body>
</html>
