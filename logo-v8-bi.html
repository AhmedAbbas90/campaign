<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWC Logo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    }

    .gwc-logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      user-select: none;
    }

    /* ── Acronym ─────────────────────────────────────────────────────── */
    .gwc-acronym {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -3px;
      color: #1a1a1a;
      line-height: 1;
    }
    .gwc-acronym .red { color: #b22222; }

    /* ── Rule ────────────────────────────────────────────────────────── */
    .gwc-rule {
      width: 100%;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
    }

    /* ── Slogan row ──────────────────────────────────────────────────── */
    /*
      "Real" / "Echte" is static. Only the keyword slides up/down.
      6 words × 1.6 s = 9.6 s cycle.
      enter end = 3.125%  (0.3 s)
      hold  end = 13.542% (1.3 s)
      exit  end = 16.667% (1.6 s)
    */
    .gwc-slogan {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
    }

    /* Static prefix — cycles in sync with the keyword */
    .gwc-static {
      color: #1a1a1a;
      position: relative;
      min-width: 3.6em;   /* wide enough for "Echter" */
      height: 1.2em;
      overflow: hidden;
    }

    .gwc-static span {
      position: absolute;
      left: 0;
      top: 0;
      line-height: 1.2em;
      opacity: 0;
      white-space: nowrap;
    }

    /* Each prefix fades in sync with its keyword slot */
    @keyframes prefixIn {
      0%      { opacity: 0; }
      3.125%  { opacity: 1; }
      13.542% { opacity: 1; }
      16.667% { opacity: 0; }
      16.7%   { opacity: 0; }
      100%    { opacity: 0; }
    }

    .gwc-static span:nth-child(1) { animation: prefixIn 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-static span:nth-child(2) { animation: prefixIn 9.6s cubic-bezier(0.22,1,0.36,1) 1.6s infinite; }
    .gwc-static span:nth-child(3) { animation: prefixIn 9.6s cubic-bezier(0.22,1,0.36,1) 3.2s infinite; }
    .gwc-static span:nth-child(4) { animation: prefixIn 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
    .gwc-static span:nth-child(5) { animation: prefixIn 9.6s cubic-bezier(0.22,1,0.36,1) 6.4s infinite; }
    .gwc-static span:nth-child(6) { animation: prefixIn 9.6s cubic-bezier(0.22,1,0.36,1) 8.0s infinite; }

    /* Cycling keyword track */
    .gwc-word-track {
      position: relative;
      height: 1.2em;
      overflow: hidden;
    }

    .gwc-word-track .word {
      position: absolute;
      left: 0;
      top: 0;
      line-height: 1.2em;
      color: #b22222;
      opacity: 0;
      transform: translateY(100%);
      white-space: nowrap;
    }

    @keyframes wordSlide {
      0%      { opacity: 0; transform: translateY(100%);  }
      3.125%  { opacity: 1; transform: translateY(0);     }
      13.542% { opacity: 1; transform: translateY(0);     }
      16.667% { opacity: 0; transform: translateY(-100%); }
      16.7%   { opacity: 0; transform: translateY(100%);  }
      100%    { opacity: 0; transform: translateY(100%);  }
    }

    /* EN words: 0 s, 1.6 s, 3.2 s — DE words: 4.8 s, 6.4 s, 8.0 s */
    .gwc-word-track .word:nth-child(1) { animation: wordSlide 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-word-track .word:nth-child(2) { animation: wordSlide 9.6s cubic-bezier(0.22,1,0.36,1) 1.6s infinite; }
    .gwc-word-track .word:nth-child(3) { animation: wordSlide 9.6s cubic-bezier(0.22,1,0.36,1) 3.2s infinite; }
    .gwc-word-track .word:nth-child(4) { animation: wordSlide 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
    .gwc-word-track .word:nth-child(5) { animation: wordSlide 9.6s cubic-bezier(0.22,1,0.36,1) 6.4s infinite; }
    .gwc-word-track .word:nth-child(6) { animation: wordSlide 9.6s cubic-bezier(0.22,1,0.36,1) 8.0s infinite; }

    /* ── Wordmark ────────────────────────────────────────────────────── */
    .gwc-wordmark {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .gwc-fullname {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #555;
    }

    .gwc-tagline {
      position: relative;
      height: 1.4em;
      overflow: hidden;
      font-size: 10px;
    }

    .gwc-tagline > span {
      position: absolute;
      left: 0;
      top: 0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #aaa;
      white-space: nowrap;
      line-height: 1.4em;
      opacity: 0;
    }

    @keyframes taglineIn {
      0%      { opacity: 0; }
      3.125%  { opacity: 1; }
      46.875% { opacity: 1; }
      50%     { opacity: 0; }
      50.1%   { opacity: 0; }
      100%    { opacity: 0; }
    }

    .gwc-tagline .t-en { animation: taglineIn 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-tagline .t-de { animation: taglineIn 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
  </style>
</head>
<body>

  <div class="gwc-logo">

    <div class="gwc-acronym"><span class="red">G</span>WC</div>
    <div class="gwc-rule"></div>

    <div class="gwc-slogan">
      <div class="gwc-static">
        <!-- EN -->
        <span>Real</span>
        <span>Real</span>
        <span>Real</span>
        <!-- DE -->
        <span>Echte</span>
        <span>Echter</span>
        <span>Echte</span>
      </div>
      <div class="gwc-word-track">
        <!-- EN -->
        <span class="word">Voice</span>
        <span class="word">Change</span>
        <span class="word">Accountability</span>
        <!-- DE -->
        <span class="word">Stimme</span>
        <span class="word">Wandel</span>
        <span class="word">Verantwortung</span>
      </div>
    </div>

    <div class="gwc-wordmark">
      <div class="gwc-fullname">Global Workforce Community</div>
      <div class="gwc-tagline">
        <span class="t-en">A Works Council That Acts for You</span>
        <span class="t-de">Ein Betriebsrat, der für dich handelt</span>
      </div>
    </div>

  </div>

</body>
</html>
