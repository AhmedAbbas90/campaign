<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWC Logo v12 – The Rising Bar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    }

    .gwc-logo {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 24px;
      user-select: none;
    }

    /* ── Bar chart mark ──────────────────────────────────────────── */
    /*
      Three bars of increasing height.
      Each bar has the pillar word as a label at the top.
      The bars grow upward on load.
    */
    .gwc-bars {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .gwc-bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .gwc-bar-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #b22222;
      white-space: nowrap;
      opacity: 0;
    }

    .gwc-bar {
      width: 22px;
      border-radius: 3px 3px 0 0;
      background: #b22222;
      transform-origin: bottom center;
      transform: scaleY(0);
    }

    /* Heights represent scale: Voice < Change < Accountability */
    .gwc-bar-col:nth-child(1) .gwc-bar { height: 44px; }
    .gwc-bar-col:nth-child(2) .gwc-bar { height: 72px; }
    .gwc-bar-col:nth-child(3) .gwc-bar { height: 100px; }

    /* Colour progression: lighter → full red */
    .gwc-bar-col:nth-child(1) .gwc-bar { background: rgba(178,34,34,0.40); }
    .gwc-bar-col:nth-child(2) .gwc-bar { background: rgba(178,34,34,0.70); }
    .gwc-bar-col:nth-child(3) .gwc-bar { background: #b22222; }

    /* Staggered grow-up animations */
    .gwc-bar-col:nth-child(1) .gwc-bar   { animation: growBar 0.5s cubic-bezier(0.22,1,0.36,1) forwards 0.2s; }
    .gwc-bar-col:nth-child(2) .gwc-bar   { animation: growBar 0.5s cubic-bezier(0.22,1,0.36,1) forwards 0.5s; }
    .gwc-bar-col:nth-child(3) .gwc-bar   { animation: growBar 0.5s cubic-bezier(0.22,1,0.36,1) forwards 0.8s; }

    .gwc-bar-col:nth-child(1) .gwc-bar-label { animation: fadeIn 0.3s ease forwards 0.7s; }
    .gwc-bar-col:nth-child(2) .gwc-bar-label { animation: fadeIn 0.3s ease forwards 1.0s; }
    .gwc-bar-col:nth-child(3) .gwc-bar-label { animation: fadeIn 0.3s ease forwards 1.3s; }

    @keyframes growBar {
      to { transform: scaleY(1); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Baseline under bars */
    .gwc-bars-base {
      width: 100%;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
      transform: scaleX(0);
      transform-origin: left center;
      animation: scaleIn 0.4s ease forwards 0.1s;
    }

    @keyframes scaleIn {
      to { transform: scaleX(1); }
    }

    /* ── Right side: GWC + wordmark ──────────────────────────────── */
    .gwc-right {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards 1.4s;
    }

    .gwc-acronym {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -3px;
      color: #b22222;
      line-height: 1;
    }

    .gwc-rule {
      width: 100%;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
    }

    .gwc-fullname {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #1a1a1a;
    }

    .gwc-tagline {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="gwc-logo">

    <!-- Bar chart -->
    <div style="display:flex;flex-direction:column;gap:0;align-items:stretch;">
      <div class="gwc-bars">
        <div class="gwc-bar-col">
          <span class="gwc-bar-label">Voice</span>
          <div class="gwc-bar"></div>
        </div>
        <div class="gwc-bar-col">
          <span class="gwc-bar-label">Change</span>
          <div class="gwc-bar"></div>
        </div>
        <div class="gwc-bar-col">
          <span class="gwc-bar-label">Account.</span>
          <div class="gwc-bar"></div>
        </div>
      </div>
      <div class="gwc-bars-base"></div>
    </div>

    <!-- GWC wordmark -->
    <div class="gwc-right">
      <div class="gwc-acronym">GWC</div>
      <div class="gwc-rule"></div>
      <div class="gwc-fullname">Global Workforce<br>Community</div>
      <div class="gwc-tagline">A Works Council That Acts for You</div>
    </div>

  </div>

</body>
</html>
