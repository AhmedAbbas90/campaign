<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWC Logo v7 – The Pulse</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    }

    .gwc-logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      user-select: none;
    }

    /* ── SVG pulse line ──────────────────────────────────────────── */
    /*
      The line is drawn using stroke-dashoffset animation —
      it "writes itself" from left to right on load, then loops.
      The path has three peaks that echo the shapes of G, W, C.
    */
    .gwc-pulse-svg {
      width: 340px;
      height: 70px;
      overflow: visible;
    }

    .gwc-pulse-path {
      fill: none;
      stroke: #b22222;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      /* total path length approximated — will be overridden by JS-free trick */
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      animation: drawLine 2.4s cubic-bezier(0.4, 0, 0.2, 1) forwards,
                 pulseLine 3s ease-in-out 2.4s infinite;
    }

    /* Initial draw-on */
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    /* Subtle breathing after draw */
    @keyframes pulseLine {
      0%, 100% { stroke-width: 3;   opacity: 1;    }
      50%       { stroke-width: 3.5; opacity: 0.85; }
    }

    /* ── GWC label sits on top of the peaks ─────────────────────── */
    .gwc-letters-row {
      display: flex;
      width: 340px;
      justify-content: space-between;
      padding: 0 8px;
      margin-top: -8px;
    }

    .gwc-letter {
      font-size: 52px;
      font-weight: 900;
      color: #b22222;
      line-height: 1;
      opacity: 0;
      transform: translateY(6px);
    }

    /* Staggered fade-in after the line draws */
    .gwc-letter:nth-child(1) { animation: letterIn 0.4s ease forwards 0.6s; }
    .gwc-letter:nth-child(2) { animation: letterIn 0.4s ease forwards 1.2s; }
    .gwc-letter:nth-child(3) { animation: letterIn 0.4s ease forwards 1.9s; }

    @keyframes letterIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Wordmark ────────────────────────────────────────────────── */
    .gwc-rule {
      width: 100%;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
      margin: 4px 0;
    }

    .gwc-fullname {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #1a1a1a;
    }

    .gwc-tagline {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="gwc-logo">

    <!-- Pulse line: three peaks aligned under G, W, C -->
    <svg class="gwc-pulse-svg" viewBox="0 0 340 70" xmlns="http://www.w3.org/2000/svg">
      <path class="gwc-pulse-path" d="
        M 0,42
        L 20,42
        L 28,42
        L 34,10
        L 40,62
        L 46,28
        L 52,52
        L 58,42
        L 80,42
        L 88,42
        L 94,8
        L 100,62
        L 106,8
        L 112,62
        L 118,42
        L 140,42
        L 148,42
        L 154,10
        L 160,62
        L 166,36
        L 172,42
        L 200,42
        L 340,42
      " />
    </svg>

    <!-- G W C sit above the three peaks -->
    <div class="gwc-letters-row">
      <span class="gwc-letter">G</span>
      <span class="gwc-letter">W</span>
      <span class="gwc-letter">C</span>
    </div>

    <div class="gwc-rule"></div>
    <div class="gwc-fullname">Global Workforce Community</div>
    <div class="gwc-tagline">A Works Council That Acts for You</div>

  </div>

</body>
</html>
