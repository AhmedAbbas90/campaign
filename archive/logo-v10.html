<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWC Logo v10 – The Tally / Counter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    }

    .gwc-logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      user-select: none;
    }

    /* ── Top row: tally marks + GWC ─────────────────────────────── */
    .gwc-top {
      display: flex;
      align-items: flex-end;
      gap: 16px;
    }

    /* ── Tally mark group ────────────────────────────────────────── */
    /*
      Four vertical bars + one diagonal = one group of 5.
      We show two complete groups (10) + one partial (3) = 13 marks.
      Each mark animates in sequentially, like votes being cast.
    */
    .gwc-tally {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding-bottom: 10px;
    }

    .tally-group {
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 44px;
    }

    .tally-bar {
      width: 4px;
      height: 40px;
      background: #b22222;
      border-radius: 2px;
      transform-origin: bottom center;
      transform: scaleY(0);
    }

    /* The diagonal strike-through bar */
    .tally-strike {
      position: absolute;
      left: -2px;
      top: 50%;
      width: calc(100% + 4px);
      height: 4px;
      background: #b22222;
      border-radius: 2px;
      transform-origin: left center;
      transform: scaleX(0) rotate(-20deg);
      margin-top: -2px;
    }

    /* Animate each bar in sequence */
    .tally-bar:nth-child(1) { animation: barIn 0.2s ease forwards 0.2s; }
    .tally-bar:nth-child(2) { animation: barIn 0.2s ease forwards 0.4s; }
    .tally-bar:nth-child(3) { animation: barIn 0.2s ease forwards 0.6s; }
    .tally-bar:nth-child(4) { animation: barIn 0.2s ease forwards 0.8s; }
    .tally-strike           { animation: strikeIn 0.25s ease forwards 1.0s; }

    .tally-group:nth-child(2) .tally-bar:nth-child(1) { animation: barIn 0.2s ease forwards 1.3s; }
    .tally-group:nth-child(2) .tally-bar:nth-child(2) { animation: barIn 0.2s ease forwards 1.5s; }
    .tally-group:nth-child(2) .tally-bar:nth-child(3) { animation: barIn 0.2s ease forwards 1.7s; }
    .tally-group:nth-child(2) .tally-bar:nth-child(4) { animation: barIn 0.2s ease forwards 1.9s; }
    .tally-group:nth-child(2) .tally-strike           { animation: strikeIn 0.25s ease forwards 2.1s; }

    /* partial group — 3 bars, no strike */
    .tally-group:nth-child(3) .tally-bar:nth-child(1) { animation: barIn 0.2s ease forwards 2.4s; }
    .tally-group:nth-child(3) .tally-bar:nth-child(2) { animation: barIn 0.2s ease forwards 2.6s; }
    .tally-group:nth-child(3) .tally-bar:nth-child(3) { animation: barIn 0.2s ease forwards 2.8s; }

    @keyframes barIn {
      to { transform: scaleY(1); }
    }
    @keyframes strikeIn {
      to { transform: scaleX(1) rotate(-20deg); }
    }

    /* ── GWC acronym ─────────────────────────────────────────────── */
    .gwc-acronym {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -3px;
      color: #b22222;
      line-height: 1;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 3.0s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Rule ────────────────────────────────────────────────────── */
    .gwc-rule {
      width: 100%;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
      margin: 6px 0 8px;
      transform: scaleX(0);
      transform-origin: left center;
      animation: ruleIn 0.4s ease forwards 3.3s;
    }

    @keyframes ruleIn {
      to { transform: scaleX(1); }
    }

    /* ── Stats row ───────────────────────────────────────────────── */
    /*
      Three counters that count up: candidates, pillars, languages.
      Pure CSS counter animation using a clip + overflow trick.
    */
    .gwc-stats {
      display: flex;
      gap: 24px;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 3.5s;
    }

    .gwc-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .gwc-stat-number {
      font-size: 32px;
      font-weight: 900;
      color: #b22222;
      line-height: 1;
    }

    .gwc-stat-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
    }

    /* ── Divider between stats ───────────────────────────────────── */
    .gwc-stat-div {
      width: 1px;
      background: #e0e0e0;
      align-self: stretch;
      margin: 4px 0;
    }

    /* ── Tagline ─────────────────────────────────────────────────── */
    .gwc-tagline {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-top: 10px;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 3.7s;
    }

    .gwc-fullname {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #555;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 3.6s;
    }
  </style>
</head>
<body>

  <div class="gwc-logo">

    <div class="gwc-top">

      <!-- Tally marks: 13 total = two groups of 5 + one of 3 -->
      <div class="gwc-tally">

        <div class="tally-group">
          <div class="tally-bar"></div>
          <div class="tally-bar"></div>
          <div class="tally-bar"></div>
          <div class="tally-bar"></div>
          <div class="tally-strike"></div>
        </div>

        <div class="tally-group">
          <div class="tally-bar"></div>
          <div class="tally-bar"></div>
          <div class="tally-bar"></div>
          <div class="tally-bar"></div>
          <div class="tally-strike"></div>
        </div>

        <div class="tally-group">
          <div class="tally-bar"></div>
          <div class="tally-bar"></div>
          <div class="tally-bar"></div>
        </div>

      </div>

      <div class="gwc-acronym">GWC</div>

    </div>

    <div class="gwc-rule"></div>
    <div class="gwc-fullname">Global Workforce Community</div>

    <!-- Stats -->
    <div class="gwc-stats">
      <div class="gwc-stat">
        <div class="gwc-stat-number">1</div>
        <div class="gwc-stat-label">List</div>
      </div>
      <div class="gwc-stat-div"></div>
      <div class="gwc-stat">
        <div class="gwc-stat-number">3</div>
        <div class="gwc-stat-label">Pillars</div>
      </div>
      <div class="gwc-stat-div"></div>
      <div class="gwc-stat">
        <div class="gwc-stat-number">19</div>
        <div class="gwc-stat-label">Languages</div>
      </div>
      <div class="gwc-stat-div"></div>
      <div class="gwc-stat">
        <div class="gwc-stat-number">1</div>
        <div class="gwc-stat-label">Voice</div>
      </div>
    </div>

    <div class="gwc-tagline">A Works Council That Acts for You</div>

  </div>

</body>
</html>
