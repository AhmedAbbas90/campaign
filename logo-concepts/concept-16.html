<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f5;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    /* Concept 16: Scales of justice — fairness, accountability, the law.
       Simple geometric balance scale beside GWC */
    .logo {
      width: 280px;
      height: 280px;
      background: #fff;
      border-radius: 24px;
      border: 2.5px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .scale {
      position: relative;
      width: 120px;
      height: 80px;
    }

    /* centre pole */
    .pole {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 3px;
      height: 70px;
      background: #1a1a1a;
      border-radius: 2px;
    }

    /* base */
    .base {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 6px;
      background: #1a1a1a;
      border-radius: 3px;
    }

    /* crossbar — slightly tilted for tension */
    .beam {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%) rotate(-6deg);
      width: 110px;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
      transform-origin: center center;
    }

    /* chains */
    .chain {
      position: absolute;
      top: 8px;
      width: 2px;
      background: #999;
    }

    .chain-l {
      left: 8px;
      height: 22px;
      transform: rotate(3deg);
    }

    .chain-r {
      right: 8px;
      height: 14px;
      transform: rotate(-3deg);
    }

    /* pans */
    .pan {
      position: absolute;
      height: 8px;
      border-radius: 0 0 20px 20px;
      border: 2px solid #1a1a1a;
      border-top: none;
      background: transparent;
    }

    .pan-l {
      width: 36px;
      left: -7px;
      top: 30px;
    }

    .pan-r {
      width: 36px;
      right: -7px;
      top: 22px;
    }

    /* top pivot dot */
    .pivot {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #b22222;
    }

    /* text */
    .gwc {
      font-size: 68px;
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: -3px;
      line-height: 1;
    }

    .gwc span { color: #b22222; }

    .sub {
      font-size: 7px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #999;
      margin-top: -8px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="scale">
      <div class="pole"></div>
      <div class="base"></div>
      <div class="beam"></div>
      <div class="pivot"></div>
      <div class="chain chain-l"></div>
      <div class="chain chain-r"></div>
      <div class="pan pan-l"></div>
      <div class="pan pan-r"></div>
    </div>
    <div class="gwc"><span>G</span>W<span>C</span></div>
    <div class="sub">Accountability · Fairness</div>
  </div>
</body>
</html>
