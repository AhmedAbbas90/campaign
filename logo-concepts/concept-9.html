<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f5;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    /* Concept 9: Concentric people arc — community feel.
       Three semicircle arcs suggesting people standing together. */
    .logo {
      width: 280px;
      height: 280px;
      background: #fff;
      border-radius: 50%;
      border: 3px solid #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 32px;
      position: relative;
      overflow: hidden;
    }

    /* arcs — concentric semicircles rising from bottom */
    .arc {
      position: absolute;
      border-radius: 50%;
      border: 0;
      background: transparent;
      border-top: none;
    }

    .arc1 {
      width: 240px; height: 120px;
      bottom: 20px;
      background: #f7e8e8;
      border-radius: 120px 120px 0 0;
    }
    .arc2 {
      width: 170px; height: 85px;
      bottom: 20px;
      background: #e8b4b4;
      border-radius: 85px 85px 0 0;
    }
    .arc3 {
      width: 100px; height: 50px;
      bottom: 20px;
      background: #b22222;
      border-radius: 50px 50px 0 0;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gwc {
      font-size: 72px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -3px;
      line-height: 1;
    }

    .top-text {
      position: absolute;
      top: 40px;
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #b22222;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="top-text">Global Workforce</div>
    <div class="arc1"></div>
    <div class="arc2"></div>
    <div class="arc3"></div>
    <div class="content">
      <div class="gwc">GWC</div>
    </div>
  </div>
</body>
</html>
