<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    /* Concept 2: Circle with bold G, fist/unity accent */
    .logo {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: #b22222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* arc stripe at bottom */
    .logo::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72px;
      background: #8a1a1a;
    }

    .letters {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: baseline;
      gap: 0px;
      line-height: 1;
    }

    .letter-g {
      font-size: 110px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }

    .letter-wc {
      font-size: 48px;
      font-weight: 900;
      color: rgba(255,255,255,0.6);
      line-height: 1;
      padding-bottom: 6px;
    }

    .tagline {
      position: relative;
      z-index: 2;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="letters">
      <span class="letter-g">G</span><span class="letter-wc">WC</span>
    </div>
    <div class="tagline">Global Workforce</div>
  </div>
</body>
</html>
