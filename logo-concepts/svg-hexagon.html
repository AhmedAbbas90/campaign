<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #f0f0f0;
    }
  </style>
</head>
<body>
<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">

  <!-- Hexagon: flat-top. 6 points calculated for a 148px radius centred at 160,160 -->
  <!-- points: top-right, right, bottom-right, bottom-left, left, top-left -->
  <polygon
    points="160,14 294,87 294,233 160,306 26,233 26,87"
    fill="#b22222"
  />

  <!-- inner hexagon — offset border effect -->
  <polygon
    points="160,34 276,99 276,221 160,286 44,221 44,99"
    fill="none"
    stroke="rgba(255,255,255,0.15)"
    stroke-width="2"
  />

  <!-- ── Ballot mark icon: simple X-in-box representing voting ──
       Small square checkbox at top centre -->
  <rect x="130" y="58" width="60" height="60" rx="8" fill="none"
    stroke="white" stroke-width="4"/>
  <!-- bold checkmark inside box -->
  <polyline points="142,90 155,103 178,72" fill="none" stroke="white"
    stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── GWC ── -->
  <text x="160" y="210" font-family="Montserrat, Arial, sans-serif" font-weight="900"
    font-size="72" fill="white" text-anchor="middle" letter-spacing="-3">GWC</text>

  <!-- horizontal rule -->
  <rect x="100" y="220" width="120" height="3" rx="1.5" fill="rgba(255,255,255,0.35)"/>

  <!-- tagline -->
  <text x="160" y="246" font-family="Montserrat, Arial, sans-serif" font-weight="700"
    font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="3.5">
    GLOBAL WORKFORCE
  </text>

  <!-- bottom tagline -->
  <text x="160" y="270" font-family="Montserrat, Arial, sans-serif" font-weight="700"
    font-size="9" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3.5">
    COMMUNITY
  </text>

</svg>
</body>
</html>
