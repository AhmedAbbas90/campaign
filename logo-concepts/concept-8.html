<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f5;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    /* Concept 8: Stacked word mark — like a newspaper masthead,
       very editorial / credible feel */
    .logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      padding: 28px 32px;
      border-left: 8px solid #b22222;
      background: #fff;
    }

    .word {
      font-size: 56px;
      font-weight: 900;
      color: #1a1a1a;
      line-height: 0.95;
      letter-spacing: -2px;
      text-transform: uppercase;
    }

    .word .highlight {
      color: #b22222;
    }

    .rule {
      width: 100%;
      height: 3px;
      background: #b22222;
      margin: 12px 0;
    }

    .tagline {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="word"><span class="highlight">G</span>lobal</div>
    <div class="word"><span class="highlight">W</span>ork</div>
    <div class="word"><span class="highlight">C</span>ommunity</div>
    <div class="rule"></div>
    <div class="tagline">Real Voice · Real Change</div>
  </div>
</body>
</html>
