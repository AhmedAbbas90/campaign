<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f5;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    /* Concept 17: Big tick / checkmark as the hero graphic — the act of voting.
       Large red checkmark, GWC sits inside the tick's corner. */
    .logo {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .logo::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 60% 60%, #fff7f7 0%, #fff 70%);
    }

    /* CSS checkmark using two rotated rectangles */
    .tick {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-58%, -48%);
    }

    .tick::before {
      content: '';
      position: absolute;
      width: 60px;
      height: 14px;
      background: #b22222;
      border-radius: 7px;
      transform: rotate(50deg);
      top: 60px;
      left: -10px;
    }

    .tick::after {
      content: '';
      position: absolute;
      width: 120px;
      height: 14px;
      background: #b22222;
      border-radius: 7px;
      transform: rotate(-35deg);
      top: 18px;
      left: 28px;
    }

    .gwc {
      position: absolute;
      bottom: 42px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 48px;
      font-weight: 900;
      color: #1a1a1a;
      letter-spacing: -2px;
      line-height: 1;
      white-space: nowrap;
      z-index: 2;
    }

    .gwc span { color: #b22222; }

    .sub {
      position: absolute;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 6.5px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #bbb;
      white-space: nowrap;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="tick"></div>
    <div class="gwc">G<span>W</span>C</div>
    <div class="sub">Global Workforce Community</div>
  </div>
</body>
</html>
