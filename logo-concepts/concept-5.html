<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    /* Concept 5: Flag / ballot paper — very on-brand for an election */
    .logo {
      width: 280px;
      height: 280px;
      background: #b22222;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    /* diagonal white sweep */
    .logo::before {
      content: '';
      position: absolute;
      bottom: -30px;
      right: -30px;
      width: 160px;
      height: 160px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
    }

    .check-box {
      width: 56px;
      height: 56px;
      border: 4px solid #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .check-box::after {
      content: '✓';
      font-size: 32px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }

    .gwc-label {
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
    }

    .sub-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="check-box"></div>
    <div class="gwc-label">GWC</div>
    <div class="sub-label">Your Vote · Your Voice</div>
  </div>
</body>
</html>
