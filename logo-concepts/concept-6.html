<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f5;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    /* Concept 6: Globe wireframe made of letter G curves */
    .logo {
      width: 280px;
      height: 280px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* outer ring */
    .ring {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: 3px solid #e0e0e0;
      position: absolute;
    }

    /* latitude lines */
    .lat {
      position: absolute;
      left: 10%;
      right: 10%;
      height: 2px;
      background: #e0e0e0;
      border-radius: 50%;
    }
    .lat1 { top: 30%; }
    .lat2 { top: 50%; }
    .lat3 { top: 70%; }

    /* vertical meridian */
    .meridian {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 2px;
      background: #e0e0e0;
      transform: translateX(-50%);
    }

    /* centre content */
    .inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: #b22222;
    }

    .monogram {
      font-size: 62px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -3px;
      line-height: 1;
    }

    .sub {
      font-size: 7.5px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="ring"></div>
    <div class="lat lat1"></div>
    <div class="lat lat2"></div>
    <div class="lat lat3"></div>
    <div class="meridian"></div>
    <div class="inner">
      <div class="monogram">GWC</div>
      <div class="sub">Global</div>
    </div>
  </div>
</body>
</html>
