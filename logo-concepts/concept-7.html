<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f5;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    /* Concept 7: Split diagonal — red top-left / dark bottom-right, letters split across */
    .logo {
      width: 280px;
      height: 280px;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .half-red {
      position: absolute;
      inset: 0;
      background: #b22222;
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }

    .half-dark {
      position: absolute;
      inset: 0;
      background: #1a1a1a;
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
    }

    .letters {
      position: relative;
      z-index: 2;
      font-size: 108px;
      font-weight: 900;
      letter-spacing: -6px;
      line-height: 1;
      /* left half white on red, right half red on dark — achieved via mix-blend-mode */
      color: #fff;
      mix-blend-mode: difference;
      /* fallback: just white */
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="half-red"></div>
    <div class="half-dark"></div>
    <div class="letters">GWC</div>
  </div>
</body>
</html>
