<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #f0f0f0;
    }
  </style>
</head>
<body>
<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');
    </style>
  </defs>

  <!-- Background circle -->
  <circle cx="160" cy="160" r="155" fill="#b22222"/>

  <!-- ── Ballot box body ── -->
  <!-- box body -->
  <rect x="90" y="118" width="140" height="90" rx="8" ry="8" fill="white"/>
  <!-- box lid -->
  <rect x="82" y="108" width="156" height="18" rx="5" ry="5" fill="white" opacity="0.9"/>
  <!-- slot in lid -->
  <rect x="136" y="112" width="48" height="7" rx="3.5" ry="3.5" fill="#b22222"/>

  <!-- ── Ballot paper being inserted ── -->
  <rect x="130" y="72" width="60" height="46" rx="4" ry="4" fill="white"/>
  <!-- ruled lines on paper -->
  <line x1="140" y1="84" x2="180" y2="84" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="93" x2="180" y2="93" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="140" y1="102" x2="170" y2="102" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- checkmark on paper -->
  <polyline points="139,84 144,90 154,79" fill="none" stroke="#b22222" stroke-width="2.5"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── GWC text ── -->
  <text x="160" y="243" font-family="Montserrat, Arial, sans-serif" font-weight="900"
    font-size="58" fill="white" text-anchor="middle" letter-spacing="-2">GWC</text>

  <!-- tagline -->
  <text x="160" y="268" font-family="Montserrat, Arial, sans-serif" font-weight="700"
    font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="3">
    GLOBAL WORKFORCE COMMUNITY
  </text>
</svg>
</body>
</html>
